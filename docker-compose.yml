version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./pcbd.db
      - PREWARM_ENABLED=true
      - PREWARM_INTERVAL_SECONDS=3600
    ports:
      - "8000:8000"
    depends_on:
      - redis
